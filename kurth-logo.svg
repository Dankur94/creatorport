<svg width="100%" viewBox="0 0 680 530" xmlns="http://www.w3.org/2000/svg">

<!-- Background rectangle (was transparent/white, now black) -->
<rect x="0" y="0" width="680" height="520" fill="var(--color-text-primary)" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Gear/Zahnrad (now in background color = white/light) -->
<g transform="translate(340, 220)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
  <!-- Gear teeth -->
  <path fill="var(--color-background-primary)" d="&#10;    M0,-140 L12,-140 L16,-120 L-16,-120 L-12,-140 Z&#10;    M0,140 L-12,140 L-16,120 L16,120 L12,140 Z&#10;    M140,0 L140,-12 L120,-16 L120,16 L140,12 Z&#10;    M-140,0 L-140,12 L-120,16 L-120,-16 L-140,-12 Z&#10;  " transform="rotate(0)" style="fill:rgb(48, 48, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path fill="var(--color-background-primary)" d="&#10;    M0,-140 L12,-140 L16,-120 L-16,-120 L-12,-140 Z&#10;    M0,140 L-12,140 L-16,120 L16,120 L12,140 Z&#10;    M140,0 L140,-12 L120,-16 L120,16 L140,12 Z&#10;    M-140,0 L-140,12 L-120,16 L-120,-16 L-140,-12 Z&#10;  " transform="rotate(22.5)" style="fill:rgb(48, 48, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path fill="var(--color-background-primary)" d="&#10;    M0,-140 L12,-140 L16,-120 L-16,-120 L-12,-140 Z&#10;    M0,140 L-12,140 L-16,120 L16,120 L12,140 Z&#10;    M140,0 L140,-12 L120,-16 L120,16 L140,12 Z&#10;    M-140,0 L-140,12 L-120,16 L-120,-16 L-140,-12 Z&#10;  " transform="rotate(45)" style="fill:rgb(48, 48, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path fill="var(--color-background-primary)" d="&#10;    M0,-140 L12,-140 L16,-120 L-16,-120 L-12,-140 Z&#10;    M0,140 L-12,140 L-16,120 L16,120 L12,140 Z&#10;    M140,0 L140,-12 L120,-16 L120,16 L140,12 Z&#10;    M-140,0 L-140,12 L-120,16 L-120,-16 L-140,-12 Z&#10;  " transform="rotate(67.5)" style="fill:rgb(48, 48, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Outer ring (white) -->
  <circle cx="0" cy="0" r="120" fill="var(--color-background-primary)" style="fill:rgb(48, 48, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Inner cutout (black/dark) -->
  <circle cx="0" cy="0" r="90" fill="var(--color-text-primary)" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Coffee bean (white on black) -->
  <g transform="rotate(-20)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <ellipse cx="0" cy="0" rx="55" ry="72" fill="var(--color-background-primary)" style="fill:rgb(48, 48, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M0,-60 C12,-20 -12,20 0,60" stroke="var(--color-text-primary)" stroke-width="5" fill="none" stroke-linecap="round" style="fill:none;stroke:rgb(250, 249, 245);color:rgb(255, 255, 255);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <ellipse cx="-18" cy="-10" rx="12" ry="30" fill="var(--color-text-primary)" opacity="0.15" transform="rotate(-8)" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>
</g>

<!-- Name: KURTH (white on black) -->
<text x="340" y="410" text-anchor="middle" font-family="var(--font-sans)" font-size="36" font-weight="500" fill="var(--color-background-primary)" letter-spacing="10" style="fill:rgb(48, 48, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:36px;font-weight:500;text-anchor:middle;dominant-baseline:auto">KURTH</text>

<!-- Divider line -->
<line x1="220" y1="425" x2="460" y2="425" stroke="var(--color-background-primary)" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(48, 48, 46);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Tagline -->
<text x="340" y="452" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="400" fill="var(--color-background-primary)" letter-spacing="4" opacity="0.7" style="fill:rgb(48, 48, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:14px;font-weight:400;text-anchor:middle;dominant-baseline:auto">KAFFEE &amp; TECHNIK</text>

</svg>